services:
  # --- Existing ScanCode.io Logic ---
  db-check:
    image: docker.io/library/postgres:17
    volumes:
      - db_data:/var/lib/postgresql/data/:ro
    entrypoint: [ "/bin/bash", "-c" ]
    command:
      - |
        DATA_DIR="/var/lib/postgresql/data"
        if [ ! -f "$$DATA_DIR/PG_VERSION" ]; then exit 0; fi
        OLD_VERSION=$$(cat "$$DATA_DIR/PG_VERSION")
        if [ "$$OLD_VERSION" -lt 17 ]; then exit 1; fi
    restart: "no"

  db:
    image: docker.io/library/postgres:17
    depends_on:
      db-check:
        condition: service_completed_successfully
    env_file:
      - docker.env
    volumes:
      - db_data:/var/lib/postgresql/data/
    shm_size: "3gb"
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s

  redis:
    image: docker.io/library/redis:latest
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: always

  chown:
    image: docker.io/library/alpine:latest
    restart: "no"
    command: sh -c "chown -R ${APP_UID:-1000}:${APP_GID:-1000} /var/scancodeio/"
    env_file:
      - docker.env
    volumes:
      - static:/var/scancodeio/static/
      - workspace:/var/scancodeio/workspace/

  web:
    build: .
    command: sh -c "./manage.py migrate && ./manage.py collectstatic --no-input && gunicorn scancodeio.wsgi:application --bind :8000 --timeout 600"
    env_file:
      - docker.env
    expose:
      - 8000
    volumes:
      - .env:/opt/scancodeio/.env
      - workspace:/var/scancodeio/workspace/
      - static:/var/scancodeio/static/
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_started }

  worker:
    build: .
    command: wait-for-it --strict web:8000 -- ./manage.py rqworker
    env_file:
      - docker.env
    volumes:
      - .env:/opt/scancodeio/.env
      - workspace:/var/scancodeio/workspace/
    depends_on: [ redis, db, web ]

  # --- DejaCode Addition ---
  dejacode-db:
    image: docker.io/library/postgres:15 # DejaCode often prefers 15
    environment:
      - POSTGRES_DB=dejacode
      - POSTGRES_USER=deja
      - POSTGRES_PASSWORD=deja_pass
    volumes:
      - dejacode_db_data:/var/lib/postgresql/data/
    restart: always

  dejacode:
    image: ghcr.io/aboutcode-org/dejacode:latest
    ports:
      - "8080:8080"
    environment:
      - ALLOWED_HOSTS=*
      - DATABASE_URL=postgres://deja:deja_pass@dejacode-db:5432/dejacode
      - CSRF_COOKIE_SECURE=False
      - SESSION_COOKIE_SECURE=False
      - SCANCODEIO_URL=http://web:8000/
    depends_on:
      - dejacode-db

  # --- Global Access ---
  nginx:
    image: docker.io/library/nginx:alpine
    ports:
      - "${NGINX_PUBLISHED_HTTP_PORT:-80}:80"
    volumes:
      - ./etc/nginx/conf.d/:/etc/nginx/conf.d/
      - static:/var/scancodeio/static/
    depends_on:
      - web
    restart: always

volumes:
  db_data:
  dejacode_db_data:
  redis_data:
  static:
  workspace: