version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: scancodeio-db
    environment:
      POSTGRES_DB: scancodeio
      POSTGRES_USER: scancodeio
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scancodeio -d scancodeio"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scancodeio-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: scancodeio-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scancodeio-network
    restart: unless-stopped

  # ClamAV antivirus service for virus scanning
  clamav:
    image: clamav/clamav:latest
    container_name: scancodeio-clamav
    environment:
      - CLAMD_CONF_MaxFileSize=100M
      - CLAMD_CONF_MaxScanSize=100M
      - CLAMD_CONF_StreamMaxLength=100M
      - FRESHCLAM_CONF_UpdateInterval=12
    volumes:
      - clamav_data:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdscan", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - scancodeio-network
    restart: unless-stopped

  web:
    image: nexb/scancode.io:latest
    container_name: scancodeio-web
    command: sh -c '
      /bin/sh docker-entrypoint.sh migrate &&
      /bin/sh docker-entrypoint.sh collectstatic --noinput &&
      gunicorn scancodeio.wsgi:application --bind 0.0.0.0:8000 --workers ${GUNICORN_WORKERS:-4} --timeout 300'
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DATABASE_URL=postgres://scancodeio:${DB_PASSWORD:-changeme}@db:5432/scancodeio
      - REDIS_URL=redis://redis:6379/0
      # CSRF FIX: Allow all hosts and origins for API access from anywhere
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-*}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-http://*,https://*}
      # ClamAV integration
      - SCANCODEIO_CLAMD_TCP_SOCKET=clamav:3310
      - SCANCODEIO_WORKSPACE_LOCATION=/var/scancodeio/workspace
      - SCANCODEIO_CACHE_LOCATION=/var/scancodeio/cache
    volumes:
      - scancodeio_workspace:/var/scancodeio/workspace
      - scancodeio_static:/app/staticfiles
    ports:
      - "${WEB_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      clamav:
        condition: service_started
    networks:
      - scancodeio-network
    restart: unless-stopped

  worker:
    image: nexb/scancode.io:latest
    container_name: scancodeio-worker
    command: sh -c '/bin/sh docker-entrypoint.sh rqworker --queue-class scancodeio.core.queues.WorkerUUIDQueue'
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DATABASE_URL=postgres://scancodeio:${DB_PASSWORD:-changeme}@db:5432/scancodeio
      - REDIS_URL=redis://redis:6379/0
      # CSRF settings (needed for worker context)
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-http://*,https://*}
      # ClamAV integration for worker scans
      - SCANCODEIO_CLAMD_TCP_SOCKET=clamav:3310
      - SCANCODEIO_WORKSPACE_LOCATION=/var/scancodeio/workspace
      - SCANCODEIO_CACHE_LOCATION=/var/scancodeio/cache
      - SCANCODEIO_WORKER_TIMEOUT=${WORKER_TIMEOUT:-3600}
    volumes:
      - scancodeio_workspace:/var/scancodeio/workspace
      - scancodeio_cache:/var/scancodeio/cache
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      clamav:
        condition: service_started
    networks:
      - scancodeio-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${WORKER_MEMORY_LIMIT:-8G}

  nginx:
    image: nginx:alpine
    container_name: scancodeio-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - scancodeio_static:/var/www/static:ro
    depends_on:
      - web
    networks:
      - scancodeio-network
    restart: unless-stopped
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:
  scancodeio_workspace:
  scancodeio_static:
  scancodeio_cache:
  clamav_data:

networks:
  scancodeio-network:
    driver: bridge