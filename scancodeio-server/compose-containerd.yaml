# Containerd/Nerdctl Compose Configuration for ScanCode.io
# Use with: nerdctl compose -f compose-containerd.yaml up -d

version: '3.8'

services:
  db:
    image: docker.io/postgres:15-alpine
    container_name: scancodeio-db
    environment:
      POSTGRES_DB: scancodeio
      POSTGRES_USER: scancodeio
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    # Containerd healthcheck via nerdctl lacks condition support
    # Health is handled in start script

  redis:
    image: docker.io/redis:7-alpine
    container_name: scancodeio-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped

  clamav:
    image: docker.io/clamav/clamav:latest
    container_name: scancodeio-clamav
    environment:
      - CLAMD_CONF_MaxFileSize=100M
      - CLAMD_CONF_MaxScanSize=100M
      - CLAMD_CONF_StreamMaxLength=100M
      - FRESHCLAM_CONF_UpdateInterval=12
    volumes:
      - clamav_data:/var/lib/clamav
    restart: unless-stopped

  web:
    image: docker.io/nexb/scancode.io:latest
    container_name: scancodeio-web
    command: >
      sh -c '
      /bin/sh docker-entrypoint.sh migrate &&
      /bin/sh docker-entrypoint.sh collectstatic --noinput &&
      gunicorn scancodeio.wsgi:application --bind 0.0.0.0:8000 --workers ${GUNICORN_WORKERS:-4} --timeout 300'
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DATABASE_URL=postgres://scancodeio:${DB_PASSWORD:-changeme}@db:5432/scancodeio
      - REDIS_URL=redis://redis:6379/0
      # CSRF FIX: Allow all hosts for remote access
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-*}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-http://*,https://*}
      # ClamAV integration
      - SCANCODEIO_CLAMD_TCP_SOCKET=clamav:3310
      - SCANCODEIO_WORKSPACE_LOCATION=/var/scancodeio/workspace
      - SCANCODEIO_CACHE_LOCATION=/var/scancodeio/cache
    volumes:
      - scancodeio_workspace:/var/scancodeio/workspace
      - scancodeio_static:/app/staticfiles
    ports:
      - "${WEB_PORT:-8000}:8000"
    restart: unless-stopped
    depends_on:
      - db
      - redis
      - clamav

  worker:
    image: docker.io/nexb/scancode.io:latest
    container_name: scancodeio-worker
    command: >
      sh -c '/bin/sh docker-entrypoint.sh rqworker --queue-class scancodeio.core.queues.WorkerUUIDQueue'
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DATABASE_URL=postgres://scancodeio:${DB_PASSWORD:-changeme}@db:5432/scancodeio
      - REDIS_URL=redis://redis:6379/0
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-http://*,https://*}
      - SCANCODEIO_CLAMD_TCP_SOCKET=clamav:3310
      - SCANCODEIO_WORKSPACE_LOCATION=/var/scancodeio/workspace
      - SCANCODEIO_CACHE_LOCATION=/var/scancodeio/cache
      - SCANCODEIO_WORKER_TIMEOUT=${WORKER_TIMEOUT:-3600}
    volumes:
      - scancodeio_workspace:/var/scancodeio/workspace
      - scancodeio_cache:/var/scancodeio/cache
    restart: unless-stopped
    depends_on:
      - db
      - redis
      - clamav

  nginx:
    image: docker.io/nginx:alpine
    container_name: scancodeio-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - scancodeio_static:/var/www/static:ro
    restart: unless-stopped
    depends_on:
      - web
    profiles:
      - production

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  scancodeio_workspace:
    driver: local
  scancodeio_static:
    driver: local
  scancodeio_cache:
    driver: local
  clamav_data:
    driver: local